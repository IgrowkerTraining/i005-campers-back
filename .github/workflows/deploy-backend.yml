name: Deploy Backend to VM via Docker

on:
  push:
    branches: 
      - main 
      - develop 
      - 'feature/*'
    paths:
      - 'src/**'
      - 'Dockerfile'
      - '.env'
      - 'package.json'
      - 'tsconfig*.json'
  workflow_dispatch:
  
  workflow_run:
    workflows: ["Deploy backend"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    defaults:
      run:
        working-directory: i005-campers-back  

    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Build y Run del contenedor
        run: |
          echo "Deteniendo contenedor previo (si existe)..."
          docker stop backend || true
          docker rm backend || true

          echo "Ejecutando contenedor..."
          docker run -d \
            --name backend \
            -p 3000:3000 \
            ${{ secrets.ARTIFACT_REGISTRY_URL }}/backend:latest

