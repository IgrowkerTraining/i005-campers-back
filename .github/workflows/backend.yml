name: Deploy backend

on:
  push:
    branches: 
      - main 
      - develop 
      - 'feature/*'
  workflow_dispatch:

env:
  PROJECT_ID: training-batch-05
  REGION: us-east1
  ARTIFACT_REPO: campers-back
  SERVICE_NAME: backend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el código
        uses: actions/checkout@v3

      - name: Autenticarse con GCP
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY_BK }}
          export_default_credentials: true

      - name: Configurar Docker para Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Docker build image
        run: |
          docker build -t ${{ secrets.ARTIFACT_REGISTRY_URL }}/backend:latest .

      - name: Push Docker image to Artifact Registry
        run: |
          docker push ${{ secrets.ARTIFACT_REGISTRY_URL }}/backend:latest 

